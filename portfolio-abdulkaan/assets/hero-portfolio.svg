<svg width="720" height="620" viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration reseaux, systemes et securite">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2733"/>
      <stop offset="0.55" stop-color="#141d26"/>
      <stop offset="1" stop-color="#0e151c"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fd6c2"/>
      <stop offset="1" stop-color="#3fae9c"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6ab70"/>
      <stop offset="1" stop-color="#c9854a"/>
    </linearGradient>
    <linearGradient id="lav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8b6ff"/>
      <stop offset="1" stop-color="#7d8fe6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#56c7b3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#56c7b3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d79a5d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d79a5d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#f5f1ea" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="720" height="620" rx="22" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="720" height="620" rx="22" fill="url(#dots)"/>
  <ellipse cx="360" cy="300" rx="320" ry="290" fill="url(#glow)"/>
  <ellipse cx="565" cy="470" rx="220" ry="200" fill="url(#glow2)"/>

  <!-- Liaisons -->
  <g stroke="#f5f1ea" stroke-opacity="0.16" stroke-width="1.6" fill="none">
    <path d="M360 300 L165 165"/>
    <path d="M360 300 L568 150"/>
    <path d="M360 300 L120 360"/>
    <path d="M360 300 L600 320"/>
    <path d="M360 300 L210 490"/>
    <path d="M360 300 L545 490"/>
  </g>
  <g fill="#56c7b3" fill-opacity="0.8">
    <circle cx="262" cy="232" r="3"/>
    <circle cx="464" cy="225" r="3"/>
    <circle cx="240" cy="330" r="3"/>
    <circle cx="480" cy="310" r="3"/>
    <circle cx="285" cy="395" r="3"/>
    <circle cx="452" cy="395" r="3"/>
  </g>

  <!-- Carte serveur (haut gauche) -->
  <g>
    <rect x="100" y="120" width="120" height="84" rx="10" fill="#1f2a35" stroke="#f5f1ea" stroke-opacity="0.18"/>
    <rect x="114" y="138" width="78" height="9" rx="4.5" fill="#f5f1ea" fill-opacity="0.55"/>
    <rect x="114" y="156" width="92" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.22"/>
    <rect x="114" y="172" width="64" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.22"/>
    <circle cx="200" cy="142" r="5" fill="url(#teal)"/>
  </g>

  <!-- Bouclier securite (haut droite) -->
  <g>
    <path d="M568 108 L606 122 V150 C606 176 590 192 568 202 C546 192 530 176 530 150 V122 Z"
          fill="#1f2a35" stroke="url(#terra)" stroke-width="2.4"/>
    <path d="M552 152 l11 11 l21 -23" fill="none" stroke="url(#terra)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Noeud accent (gauche) -->
  <circle cx="120" cy="360" r="16" fill="#1f2a35" stroke="url(#lav)" stroke-width="2.4"/>
  <circle cx="120" cy="360" r="5" fill="url(#lav)"/>

  <!-- Carte serveur (droite) -->
  <g>
    <rect x="560" y="280" width="120" height="84" rx="10" fill="#1f2a35" stroke="#f5f1ea" stroke-opacity="0.18"/>
    <rect x="574" y="298" width="70" height="9" rx="4.5" fill="#f5f1ea" fill-opacity="0.55"/>
    <rect x="574" y="316" width="92" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.22"/>
    <rect x="574" y="332" width="58" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.22"/>
    <circle cx="660" cy="302" r="5" fill="url(#terra)"/>
  </g>

  <!-- Noeud accent (bas droite) -->
  <circle cx="545" cy="490" r="16" fill="#1f2a35" stroke="url(#teal)" stroke-width="2.4"/>
  <circle cx="545" cy="490" r="5" fill="url(#teal)"/>

  <!-- Terminal (bas gauche) -->
  <g>
    <rect x="120" y="430" width="190" height="120" rx="12" fill="#101820" stroke="#f5f1ea" stroke-opacity="0.16"/>
    <circle cx="138" cy="448" r="4" fill="#e06a5a"/>
    <circle cx="152" cy="448" r="4" fill="#e6b15a"/>
    <circle cx="166" cy="448" r="4" fill="#5ac98a"/>
    <rect x="136" y="470" width="14" height="7" rx="3.5" fill="url(#teal)"/>
    <rect x="156" y="470" width="120" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.3"/>
    <rect x="136" y="488" width="14" height="7" rx="3.5" fill="url(#terra)"/>
    <rect x="156" y="488" width="92" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.3"/>
    <rect x="136" y="506" width="14" height="7" rx="3.5" fill="url(#lav)"/>
    <rect x="156" y="506" width="108" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.3"/>
    <rect x="136" y="524" width="64" height="7" rx="3.5" fill="#f5f1ea" fill-opacity="0.18"/>
  </g>

  <!-- Hub central (router + ondes) -->
  <g>
    <circle cx="360" cy="300" r="104" fill="none" stroke="#56c7b3" stroke-opacity="0.14" stroke-width="1.4"/>
    <circle cx="360" cy="300" r="74" fill="none" stroke="#56c7b3" stroke-opacity="0.22" stroke-width="1.4"/>
    <circle cx="360" cy="300" r="46" fill="#16202a" stroke="#56c7b3" stroke-opacity="0.5" stroke-width="1.6"/>
    <circle cx="360" cy="300" r="30" fill="url(#teal)"/>
    <g stroke="#0e151c" stroke-width="3.2" stroke-linecap="round" fill="none">
      <path d="M360 286 v-9"/>
      <path d="M360 314 v9"/>
      <path d="M346 300 h-9"/>
      <path d="M374 300 h9"/>
    </g>
    <circle cx="360" cy="300" r="5.5" fill="#0e151c"/>
  </g>
</svg>
